<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polymarket Bot — Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .brand {
      color: #a78bfa;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
    }
    .btn-accent {
      background: #7c3aed;
      border: none;
      color: #fff;
      font-weight: 600;
    }
    .btn-accent:hover { background: #6d28d9; color: #fff; }
    .form-control:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,.25);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="mb-2">
        <i class="bi bi-graph-up-arrow" style="font-size:2rem;color:#a78bfa"></i>
      </div>
      <div class="brand">Polymarket Bot</div>
      <div class="text-secondary mt-1" style="font-size:.82rem">
        {% if has_password %}Introduce tu contraseña para continuar{% else %}Primera vez — crea una contraseña{% endif %}
      </div>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 mb-3" style="font-size:.83rem">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" autocomplete="off">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}" />
      {% if not has_password %}
      <div class="mb-3">
        <label class="form-label text-secondary small">Nueva contraseña <span class="text-danger">*</span></label>
        <input type="password" name="password" class="form-control bg-dark text-light border-secondary"
          placeholder="Mínimo 8 caracteres" required autofocus />
      </div>
      <div class="mb-4">
        <label class="form-label text-secondary small">Confirmar contraseña <span class="text-danger">*</span></label>
        <input type="password" name="password2" class="form-control bg-dark text-light border-secondary"
          placeholder="Repite la contraseña" required />
      </div>
      <button type="submit" class="btn btn-accent w-100">
        <i class="bi bi-shield-lock-fill me-1"></i>Crear contraseña y entrar
      </button>
      {% else %}
      <div class="mb-4">
        <label class="form-label text-secondary small">Contraseña</label>
        <input type="password" name="password" class="form-control bg-dark text-light border-secondary"
          placeholder="••••••••" required autofocus />
      </div>
      <button type="submit" class="btn btn-accent w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
      </button>
      {% endif %}
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
