[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort
select = ["E", "W", "F", "I"]
ignore = [
    "E501",  # line-too-long — handled per-project style
    "E741",  # ambiguous variable name (l, O, I) — not critical
]

[tool.ruff.lint.isort]
# ruff auto-detects project-root .py files as first-party; no explicit list needed
